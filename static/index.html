<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telcyte As-Built Summation</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="brand">
          <div class="mark">TELCYTE</div>
          <div>
            <h1>As-Built Summation</h1>
            <p>Upload one PDF as-built and receive the annotated billing totals PDF.</p>
          </div>
        </div>

        <form id="upload-form" class="dropzone">
          <input id="pdf-file" name="file" type="file" accept="application/pdf,.pdf" />
          <label class="file-picker" for="pdf-file">
            <span id="file-label">Choose PDF</span>
            <strong id="file-name">No file selected</strong>
          </label>

          <section class="extras" aria-labelledby="extras-title">
            <div class="extras-head">
              <div>
                <h2 id="extras-title">Optional extra billing codes</h2>
                <p>Only selected codes are added to the PDF.</p>
              </div>
              <input id="code-search" type="search" placeholder="Search codes" autocomplete="off" />
            </div>
            <div id="code-list" class="code-list" aria-live="polite"></div>
          </section>

          <button id="submit" type="submit">Generate PDF</button>
        </form>

        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
