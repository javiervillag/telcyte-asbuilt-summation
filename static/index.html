<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Telcyte As-Built Summation</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="masthead">
      <div class="masthead-inner">
        <div>
          <h1>Telcyte As-Built Summation</h1>
          <p>MKR Job Totals</p>
        </div>
        <div class="pills" aria-label="Service status">
          <span class="pill">Live</span>
          <span class="pill">PDF Intake</span>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="layout">
        <article class="card upload-card">
          <div class="card-heading">
            <span class="eyebrow">PDF</span>
            <h2>Input</h2>
          </div>

          <form id="upload-form" class="dropzone">
            <input id="pdf-file" name="file" type="file" accept="application/pdf,.pdf" />
            <label for="pdf-file">
              <span id="file-label">Choose PDF</span>
              <strong id="file-name">No file selected</strong>
            </label>
            <button id="submit" type="submit">Generate PDF</button>
          </form>
        </article>

        <article class="card extras-card">
          <div class="card-heading">
            <span class="eyebrow">Optional</span>
            <h2>Extra Billing Codes</h2>
          </div>
          <div class="extras-toolbar">
            <p>Only selected extras are added to the PDF.</p>
            <input id="code-search" type="search" placeholder="Search codes" autocomplete="off" />
          </div>
          <div id="code-list" class="code-list" aria-live="polite"></div>
        </article>

        <article class="card result-card">
          <div class="card-heading">
            <span class="eyebrow">Result</span>
            <h2>Processing</h2>
          </div>
          <div id="status" class="status empty" role="status" aria-live="polite">
            <div>
              <strong>Ready</strong>
              <span>Waiting for PDF</span>
            </div>
          </div>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
